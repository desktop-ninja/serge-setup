# =============================================================================
# Terminal Settings
# =============================================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set-option -g default-command 'zsh'

# =============================================================================
# General Settings
# =============================================================================
set -g mouse on
set -g focus-events on
set -sg escape-time 10
set-window-option -g mode-keys vi
set-option -g automatic-rename off
set-option -g status-position top

# =============================================================================
# Activity Hooks (watchgha guard)
# =============================================================================
set-hook -g client-attached "run-shell \"sh ~/scripts/tmux/touch-activity.sh #{session_name}\""
set-hook -g client-session-changed "run-shell \"sh ~/scripts/tmux/touch-activity.sh #{session_name}\""
set-hook -g after-select-window "run-shell \"sh ~/scripts/tmux/touch-activity.sh #{session_name}\""
set-hook -g pane-focus-in "run-shell \"sh ~/scripts/tmux/touch-activity.sh #{session_name}\""

# =============================================================================
# Logging
# =============================================================================
# Log tmux server start once per server lifetime.
if-shell -F "#{==:#{env:TMUX_SERVER_START_LOGGED},1}" "" "run-shell \"tmux set-environment -g TMUX_SERVER_START_LOGGED 1; date '+%Y-%m-%d %H:%M:%S start' >> /tmp/tmux-start.log\""

# =============================================================================
# Key Bindings
# =============================================================================
# Pane splitting
unbind %
bind | split-window -h
unbind '"'
bind _ split-window -v

# Config reload
unbind r
bind r source-file ~/.tmux.conf \; run-shell "date '+%Y-%m-%d %H:%M:%S reload' >> /tmp/tmux-reload.log" \; display-message "Config reloaded! Startup logs: /tmp/tmux-like4like.log /tmp/tmux-humanlike.log /tmp/tmux-serge-setup.log"

# Session chooser (sorted by name)
bind s choose-tree -s -Z -O name

# Pane resizing
bind j resize-pane -D 15
bind k resize-pane -U 15
bind l resize-pane -R 15
bind h resize-pane -L 15
bind -r m resize-pane -Z

# Vi copy mode
unbind [
bind v copy-mode
bind -T copy-mode-vi Escape send -X cancel
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane


# =============================================================================
# Plugins (TPM)
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'dracula/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# =============================================================================
# Dracula Theme Configuration
# =============================================================================
set -g @dracula-show-powerline true
set -g @dracula-show-left-icon "#S"
set -g status-left-length 50
set -g @dracula-plugins "git"
set -g @dracula-show-flags true
set -g @dracula-border-contrast true
set -g @dracula-refresh-rate 5

# Git settings
set -g @dracula-git-show-current-symbol true
set -g @dracula-git-show-diff-symbol true
set -g @dracula-git-no-repo-message ""

# =============================================================================
# Resurrect & Continuum Configuration
# =============================================================================
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# =============================================================================
# Project Sessions (auto-start)
# =============================================================================
run-shell "sh ~/scripts/tmux/like4like-platform.sh >/tmp/tmux-like4like.log 2>&1"
run-shell "sh ~/scripts/tmux/serge-setup.sh >/tmp/tmux-serge-setup.log 2>&1"
run-shell "sh ~/scripts/tmux/humanlike-platform.sh >/tmp/tmux-humanlike.log 2>&1"
run-shell "sh ~/scripts/tmux/openclaw.sh >/tmp/tmux-openclaw.log 2>&1"
run-shell "sh ~/scripts/tmux/himalaya-mail.sh >/tmp/tmux-himalaya-mail.log 2>&1"
run-shell "sh ~/scripts/tmux/blo.sh >/tmp/tmux-blo.log 2>&1"
run-shell "sh ~/scripts/tmux/seedstart.sh >/tmp/tmux-seedstart.log 2>&1"

# =============================================================================
# Initialize TPM (must be at very bottom)
# =============================================================================
run '~/.tmux/plugins/tpm/tpm'

# Post-TPM overrides (must be after plugins to stick)
unbind d
bind-key -T prefix e detach-client
unbind S
unbind C-s
bind u run-shell ~/.tmux/plugins/tmux-resurrect/scripts/save.sh
