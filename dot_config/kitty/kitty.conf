# Tmux prefix (Cmd+b → Ctrl+b)
map super+b send_text normal,application \x02

# Pane navigation (Cmd+hjkl → Ctrl+hjkl) — works for tmux + nvim
map super+h send_text normal,application \x08
map super+j send_text normal,application \x0a
map super+k send_text normal,application \x0b
map super+l send_text normal,application \x0c

# Disable default Cmd+r (resize window)
map super+r no_op
# fzf history search (Cmd+r → Ctrl+r)
map super+r send_text normal,application \x12

# fzf file finder (Cmd+f → Ctrl+t)
map super+f send_text normal,application \x14

# fzf directory cd (Cmd+e → Ctrl+^, remapped in zsh)
map super+e send_text normal,application \x1e
